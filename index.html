<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_OVERRIDE_//: LOG_IN</title>
    <style>
        /* Base Reset & Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            background-color: #050b05;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #39ff14;
            /* Retro CRT scanline texture */
            background-image: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
        }

        /* Ambient Glow & Grid Background overlay */
        .ambient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(57, 255, 20, 0.08) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
            z-index: 1;
        }

        /* Glitch Animation for Atmosphere */
        @keyframes textFlicker {
            0% { opacity: 0.98; text-shadow: 0 0 4px #39ff14; }
            50% { opacity: 1; text-shadow: 0 0 10px #39ff14, 0 0 20px #11aa00; }
            55% { opacity: 0.95; }
            100% { opacity: 0.99; text-shadow: 0 0 4px #39ff14; }
        }

        /* Central Terminal Container */
        .terminal-container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 500px;
            background: rgba(4, 15, 4, 0.85);
            border: 1px solid #39ff14;
            padding: 30px;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
            text-align: center;
            animation: textFlicker 3s infinite;
        }

        .terminal-header {
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-bottom: 25px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        /* Cipher Input Box styling */
        .cipher-input-wrapper {
            position: relative;
            margin: 20px 0;
        }

        input[type="text"] {
            width: 100%;
            background: transparent;
            border: 1px dashed #39ff14;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            color: #39ff14;
            text-align: center;
            outline: none;
            letter-spacing: 3px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-style: solid;
            box-shadow: inset 0 0 10px rgba(57, 255, 20, 0.3), 0 0 10px rgba(57, 255, 20, 0.3);
        }

        /* Floating placeholder label simulation */
        input[type="text"]::placeholder {
            color: rgba(57, 255, 20, 0.4);
            text-transform: uppercase;
            font-size: 1rem;
        }

        /* Hidden status message node */
        .status-msg {
            margin-top: 15px;
            font-size: 0.9rem;
            min-height: 20px;
            letter-spacing: 1px;
        }

        .error { color: #ff3333; text-shadow: 0 0 5px #ff3333; }
        .success { color: #39ff14; text-shadow: 0 0 5px #39ff14; }

        /* Cryptic background details */
        .bg-deco {
            position: absolute;
            font-size: 0.7rem;
            opacity: 0.15;
            user-select: none;
            pointer-events: none;
            white-space: pre;
        }
        .top-left { top: 15px; left: 15px; text-align: left; }
        .bottom-right { bottom: 15px; right: 15px; text-align: right; }
    </style>
</head>
<body>

    <div class="ambient-overlay"></div>

    <!-- Cryptic Decorative Metadata -->
    <div class="bg-deco top-left">
        SYS_STATUS: DEGRADED<br>
        LOC: [REDACTED]<br>
        SIG_強度: IIII|||...
    </div>
    <div class="bg-deco bottom-right">
        ENC_TYPE: AES_256_BLOCK<br>
        NODE_ID: 0x7F3A9<br>
        "The truth is written in the static."
    </div>

    <!-- Main ARG Interface -->
    <div class="terminal-container">
        <div class="terminal-header">
            --- SECURE NODE ACCESS PROTOCOL ---
        </div>
        
        <div class="cipher-input-wrapper">
            <input type="text" id="cipherInput" placeholder="enter code" autocomplete="off" spellcheck="false">
        </div>

        <div class="status-msg" id="statusMessage"></div>
    </div>

    <script>
        const inputEl = document.getElementById('cipherInput');
        const statusEl = document.getElementById('statusMessage');

        // Simple placeholder interaction to make it feel responsive
        inputEl.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const val = inputEl.value.trim().toLowerCase();
                
                if (val === '') {
                    statusEl.className = "status-msg error";
                    statusEl.innerText = "ERROR: EMPTY_PAYLOAD";
                    return;
                }

                // Add your custom ARG puzzle answers here!
                if (val === 'seek' || val === '404' || val === 'hello') {
                    statusEl.className = "status-msg success";
                    statusEl.innerText = "ACCESS GRANTED. REDIRECTING...";
                    // window.location.href = "next_puzzle.html"; // Uncomment to link pages
                } else {
                    statusEl.className = "status-msg error";
                    statusEl.innerText = `ERR_INVALID_KEY: "${val.toUpperCase()}"`;
                    
                    // Simple screen shake effect on failure
                    inputEl.style.transform = "translateX(5px)";
                    setTimeout(() => inputEl.style.transform = "translateX(-5px)", 50);
                    setTimeout(() => inputEl.style.transform = "translateX(0)", 100);
                }
            }
        });
    </script>
</body>
</html>
